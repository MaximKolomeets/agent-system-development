version: 1

purpose: >
  Машиночитаемый manifest для безопасного применения methodology repository
  к target repository. Manifest помогает отличать generic documents от файлов,
  которые требуют target adaptation или отражают template repository state.

visibility:
  methodology_repository: public
  target_repository: определяется отдельно для каждого target repository
  rule: >
    Private data target repository нельзя переносить в public methodology
    repository. Visibility target repository не наследуется автоматически.
  repository_role: >
    agent-system-development является reusable methodology/template repository,
    а не центральным репозиторием управления downstream-проектами.

categories:
  generic:
    description: >
      Reusable methodology content, которое можно использовать как основу.
    files:
      - docs/agent-system/ADOPTION_GUIDE.md
      - docs/agent-system/ADOPTION_TRANSFER_MANIFEST.yml
      - docs/agent-system/DOWNSTREAM_ADAPTATION_CHECKLIST.md
      - docs/agent-system/ENGINE_ENTRYPOINT.md
      - docs/agent-system/ENGINE_JOURNAL_CONTRACT.md
      - docs/agent-system/ENGINE_SELF_DISCOVERY_CONTRACT.md
      - docs/agent-system/TASK_FILE_HANDOFF_CONTRACT.md
      - docs/agent-system/METHODOLOGY_FEEDBACK_LOOP.md
      - docs/agent-system/PROJECT_CONSTITUTION_FRAMEWORK.md
      - docs/agent-system/PROJECT_LIFECYCLE.md
      - docs/agent-system/TARGET_PROJECT_GOVERNANCE_PACK.md
      - docs/agent-system/engine-journal/README.md
      - docs/agent-system/engine-journal/INDEX.md
      - docs/agent-system/engine-journal/templates/ENGINE_TASK_FILE_TEMPLATE.md
      - docs/agent-system/engine-journal/templates/ENGINE_RESULT_FILE_TEMPLATE.md
      - docs/agent-system/templates/TARGET_REPOSITORY_ADOPTION_CHAT_PROMPT.md
      - docs/agent-system/templates/ADOPTION_AUDIT_TASK_TEMPLATE.md
      - docs/agent-system/templates/DOCS_ONLY_ADOPTION_TASK_TEMPLATE.md
      - docs/agent-system/templates/TARGET_PROJECT_GOVERNANCE_PACK_TEMPLATE.md
      - docs/agent-system/templates/PROJECT_CONSTITUTION_TEMPLATE.md
      - docs/agent-system/templates/PROJECT_DASHBOARD_TEMPLATE.md
      - docs/agent-system/templates/ROADMAP_TEMPLATE.md
      - docs/agent-system/templates/BACKLOG_TEMPLATE.md
      - docs/agent-system/templates/PROJECT_GUARDRAILS_TEMPLATE.md
      - docs/agent-system/templates/ENGINE_REGISTRY_TEMPLATE.md
    notes:
      - Перед переносом все равно проверить local AGENTS.md target repository.

  requires_target_adaptation:
    description: >
      Файлы можно использовать только после переписывания под target repository.
    files:
      - AGENTS.md
      - README.md
      - docs/agent-system/TARGET_REPOSITORY_ADOPTION_GUIDE.md
      - docs/agent-system/NEW_PROJECT_ONBOARDING_GUIDE.md
      - docs/agent-system/BRANCH_POLICY.md
      - docs/agent-system/WORKFLOW.md
      - docs/agent-system/PR_WORKFLOW.md
      - docs/agent-system/ROLE_MODEL.md
      - docs/agent-system/PROJECT_GUARDRAILS.md
      - docs/agent-system/ENGINE_REGISTRY.md
      - docs/agent-system/PUBLICATION_POLICY.md
      - docs/agent-system/MANUAL_REVIEW_CHECKLIST.md
      - docs/agent-system/CI_POLICY.md
      - docs/agent-system/WORKTREE_GUIDE.md
      - docs/agent-system/templates/** # target-copied/adapted template instances; source templates explicitly listed in categories.generic.files remain reusable sources
      - PROJECT_CONSTITUTION.md
      - PROJECT_DASHBOARD.md
      - ROADMAP.md
      - RUNBOOK.md
      - DECISIONS.md
    adaptation_required:
      - repository name
      - repository visibility
      - project goal and non-goals
      - roadmap stages
      - backlog task ids
      - branch model
      - developer vs develop
      - worktree paths
      - project mission and strategic goal
      - decision authority levels
      - scope expansion control
      - role names
      - task ids and issue/PR mapping
      - forbidden data rules
      - CI branch filters

  template_state_do_not_copy_verbatim:
    description: >
      Файлы отражают состояние methodology repository и не должны копироваться
      в target repository дословно.
    files:
      - docs/agent-system/CURRENT_STATE.md
      - docs/agent-system/NEXT_STEPS.md
      - docs/agent-system/BACKLOG.md
      - docs/agent-system/DECISION_LOG.md
      - PROJECT_CONSTITUTION.md
      - PROJECT_DASHBOARD.md
      - ROADMAP.md
      - RUNBOOK.md
      - DECISIONS.md
      - docs/agent-system/source/**
      - docs/agent-system/agents/**
    rewrite_required:
      - current state переписать по фактам target repository
      - next steps переписать по текущему плану target repository
      - backlog создать по candidate tasks target repository
      - project constitution создать по mission, success criteria, out-of-scope, strategic goal и authority target repository
      - dashboard создать по текущему состоянию target repository
      - roadmap создать по target milestones
      - decision log заполнять только решениями target repository
      - agent reports создавать заново для target repository

rules:
  - id: no_verbatim_state_copy
    text: >
      Не копировать CURRENT_STATE.md, NEXT_STEPS.md и DECISION_LOG.md
      из methodology repository verbatim.
  - id: local_instructions_first
    text: Local AGENTS.md и локальные инструкции target repository имеют приоритет.
  - id: methodology_repository_not_downstream_control_center
    text: >
      Не хранить в methodology repository рабочие ветки, отчеты, исходный код,
      секреты или project-specific state target repository.
  - id: mandatory_engine_task_header
    text: >
      Каждая задача для engine начинается с русскоязычной шапки
      "Задача для <agent-name>: <task-id>" и блока рекомендуемого режима.
  - id: target_project_governance_pack
    text: >
      Target repository получает governance pack: dashboard, roadmap, backlog,
      current state, next steps, decision log, project constitution,
      project guardrails и engine registry.
  - id: project_constitution_required
    text: >
      Target repository должен иметь PROJECT_CONSTITUTION.md или явно указать,
      почему constitution отложен. Constitution фиксирует mission, out-of-scope,
      architecture principles, decision authority и scope expansion control.
  - id: governance_state_rewritten
    text: >
      Governance state files создаются заново по фактам target repository и
      не копируются verbatim из methodology repository.
  - id: no_private_data
    text: >
      Не переносить credentials, tokens, passwords, API keys, .env,
      private data, client data или internal code names.
  - id: no_runtime_in_docs_bootstrap
    text: >
      Не смешивать docs-only adoption с runtime code, Docker, services,
      workers, orchestrator или API.
  - id: separate_runtime_decision
    text: Runtime adoption требует отдельного архитектурного решения.
  - id: source_mirror_not_changed_by_default
    text: Source mirror не меняется в audit-only и docs-only adoption без отдельного scope.
  - id: engine_journal_scaffold_only
    text: >
      Engine journal scaffold/templates переносится в target repository.
      Methodology repository operational history не переносится. Реальные
      task/result files создаются только в target repository.

branch_adaptation:
  template_default: developer
  target_repository_may_use:
    - developer
    - develop
    - main-only flow
    - custom branch model
  required_checks:
    - проверить фактические ветки target repository
    - адаптировать BRANCH_POLICY.md
    - адаптировать WORKFLOW.md
    - адаптировать PR_WORKFLOW.md
    - адаптировать task templates
    - проверить GitHub Actions branch filters
    - не переименовывать ветки без отдельного решения пользователя

minimal_first_pr:
  adoption_mode: audit-only
  allowed_outputs:
    - docs/agent-system/ADOPTION_AUDIT.md
    - docs/agent-system/engine-journal/README.md
    - docs/agent-system/engine-journal/INDEX.md
    - "docs/agent-system/engine-journal/input/TASK-*.md"
    - "docs/agent-system/engine-journal/output/RESULT-*.md"
    - docs/agent-system/engine-journal/templates/ENGINE_TASK_FILE_TEMPLATE.md
    - docs/agent-system/engine-journal/templates/ENGINE_RESULT_FILE_TEMPLATE.md
  forbidden_changes:
    - runtime code
    - Docker
    - CI
    - Source mirror
    - architecture docs
    - bulk template copy
    - AGENTS.md/README.md without separate user decision
    - target governance state without target adaptation
  acceptance_criteria:
    - repository self-discovery выполнен
    - local instructions прочитаны
    - working tree clean или используется отдельный clean worktree
    - создан только adoption audit
    - target-specific engine journal task/result artifacts created
    - RESULT file has final PR URL and commit SHA when PR is ready for review
    - INDEX entry has final PR URL/status
    - no unresolved journal placeholders
    - target task/result journal supports task-file-handoff when used
    - methodology operational history not copied
    - final report содержит Methodology feedback

docs_only_governance_pack:
  allowed_templates:
    - docs/agent-system/templates/TARGET_PROJECT_GOVERNANCE_PACK_TEMPLATE.md
    - docs/agent-system/templates/PROJECT_CONSTITUTION_TEMPLATE.md
    - docs/agent-system/templates/PROJECT_DASHBOARD_TEMPLATE.md
    - docs/agent-system/templates/ROADMAP_TEMPLATE.md
    - docs/agent-system/templates/BACKLOG_TEMPLATE.md
    - docs/agent-system/templates/PROJECT_GUARDRAILS_TEMPLATE.md
    - docs/agent-system/templates/ENGINE_REGISTRY_TEMPLATE.md
  target_files_to_create_or_adapt:
    - PROJECT_CONSTITUTION.md
    - PROJECT_DASHBOARD.md
    - ROADMAP.md
    - RUNBOOK.md
    - DECISIONS.md
    - docs/agent-system/CURRENT_STATE.md
    - docs/agent-system/NEXT_STEPS.md
    - docs/agent-system/BACKLOG.md
    - docs/agent-system/DECISION_LOG.md
    - docs/agent-system/PROJECT_GUARDRAILS.md
    - docs/agent-system/ENGINE_REGISTRY.md
  rule: >
    Эти файлы пишутся по target repository facts и не должны содержать
    private data, client data, private repository URL или internal code names.

governance_review:
  required_checks:
    - соответствие project mission
    - соответствие current strategic goal
    - отсутствие out-of-scope violation
    - отсутствие unapproved architecture level change
    - explicit user approval для Level 3+ decisions
    - stop and user decision для major scope expansion

template_materialization:
  reusable_source_templates:
    rule: >
      Templates explicitly listed in categories.generic.files are reusable
      source templates from methodology repository. They may be copied as
      template references or used to generate target files.
  target_materialized_files:
    rule: >
      Any target repository files created from templates must be adapted to
      target repository facts. Target state files must never be copied verbatim
      from methodology repository.
