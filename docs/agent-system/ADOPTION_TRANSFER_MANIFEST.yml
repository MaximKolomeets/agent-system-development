      - target_generated files не копируются verbatim из methodology repository.
      - source parity проверяет source_templates, а не наличие target_generated paths в source checkout.

  history_state:
    description: >
      История, состояние и производные snapshots methodology repository. Эти файлы
      не являются reusable source для target-copy и не входят в source parity.
    files:
