      - target state files создавать заново по target facts
      - source snapshots считать derived context, а не source of truth
      - agent reports создавать заново для target repository

  journal:
    description: >
      Engine journal scaffold and operational history. Target repository получает
      структуру/шаблоны, но не копирует operational rows или TASK/RESULT history
