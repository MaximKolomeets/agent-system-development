version: 1

methodology_reference_required: true

# Машиночитаемая копия спецификации methodology_reference.
# Human canon: docs/agent-system/ENGINE_ENTRYPOINT.md, раздел «Methodology reference».
# Этот блок остаётся как машинная схема для adoption/audit tooling и должен совпадать с каноном.
methodology_reference_schema:
  repository: MaximKolomeets/agent-system-development
  source_branch: developer
  # Обязательно: воспроизводимый anchor; tag не заменяет commit SHA.
  source_commit: "<commit-sha>"
  # Опционально: human-readable pointers; можно опустить или оставить пустыми, если тега нет.
  source_tag: "<optional annotated tag on source_commit>"
  release_tag: "<optional release tag>"
  checked_at: "<ISO-8601 timestamp>"
  reference_type: commit
  notes: "<short Russian note>"

purpose: >
  Машиночитаемый manifest для безопасного применения methodology repository
  к target repository. Manifest помогает отличать generic documents от файлов,
  которые требуют target adaptation или отражают template repository state.

visibility:
  methodology_repository: public
  target_repository: определяется отдельно для каждого target repository
  rule: >
    Private data target repository нельзя переносить в public methodology
    repository. Visibility target repository не наследуется автоматически.
  repository_role: >
    agent-system-development является reusable methodology/template repository,
    а не центральным репозиторием управления downstream-проектами.

scope:
  covers: >
    Methodology source set: docs/agent-system/** плюс назначенные root-файлы,
    явно перечисленные в categories.source/template/generated.
  root_files:
    - AGENTS.md
    - README.md
  out_of_scope:
    - .github/**
    - repo-local CI/runtime/guard infrastructure, если путь явно не перечислен в categories
  notes:
    - >
      .github/workflows/forbidden-files.yml намеренно вне карты: это repo-guard,
      а не methodology source file.
    - >
      PROJECT_FILE_MAP.md строится из categories ниже; repo infrastructure вне
      methodology source set не является неучтённым canonical/operational doc.
    - >
      docs/agent-system/cloud/** является generated mirror для загрузки context
      bundle оркестратора и не является source-transferable content.

orchestrator_context_bundle:
  source_canon: docs/agent-system/ORCHESTRATOR_OPERATING_CONTRACT.md#architect-orchestrator-context-handoff
  generated_dir: docs/agent-system/cloud
  max_files: 25
  files:
    - path: docs/agent-system/ORCHESTRATOR_OPERATING_CONTRACT.md
      cloud_flatname: ORCHESTRATOR_OPERATING_CONTRACT.md
    - path: docs/agent-system/ORCHESTRATOR_RESPONSE_STANDARD.md
      cloud_flatname: ORCHESTRATOR_RESPONSE_STANDARD.md
    - path: docs/agent-system/templates/TASK_HEADER_COMMON.md
      cloud_flatname: TASK_HEADER_COMMON.md
    - path: docs/agent-system/BRANCH_POLICY.md
      cloud_flatname: BRANCH_POLICY.md
    - path: docs/agent-system/ENGINE_JOURNAL_CONTRACT.md
      cloud_flatname: ENGINE_JOURNAL_CONTRACT.md
    - path: docs/agent-system/CURRENT_STATE.md
      cloud_flatname: CURRENT_STATE.md
    - path: docs/agent-system/engine-journal/INDEX.md
      cloud_flatname: ENGINE_JOURNAL_INDEX.md
    - path: docs/agent-system/NEXT_STEPS.md
      cloud_flatname: NEXT_STEPS.md
    - path: docs/agent-system/ENGINE_ENTRYPOINT.md
      cloud_flatname: ENGINE_ENTRYPOINT.md
    - path: docs/agent-system/PROJECT_FILE_MAP.md
      cloud_flatname: PROJECT_FILE_MAP.md
    - path: docs/agent-system/ADOPTION_TRANSFER_MANIFEST.yml
      cloud_flatname: ADOPTION_TRANSFER_MANIFEST.yml
    - path: docs/agent-system/REVIEW_AUTOLOOP.md
      cloud_flatname: REVIEW_AUTOLOOP.md
    - path: docs/agent-system/TASK_CONTRACT.md
      cloud_flatname: TASK_CONTRACT.md
    - path: docs/agent-system/SEMANTIC_COMPLETENESS_GATES.md
      cloud_flatname: SEMANTIC_COMPLETENESS_GATES.md
    - path: docs/agent-system/JOURNAL_FINALIZATION_POLICY.md
      cloud_flatname: JOURNAL_FINALIZATION_POLICY.md
    - path: docs/agent-system/ACCEPTANCE_SPEC_COMPLETENESS_PATTERN.md
      cloud_flatname: ACCEPTANCE_SPEC_COMPLETENESS_PATTERN.md
    - path: docs/agent-system/DOWNSTREAM_FEEDBACK_LOOP.md
      cloud_flatname: DOWNSTREAM_FEEDBACK_LOOP.md
    - path: docs/agent-system/DOWNSTREAM_FEEDBACK_SANITIZATION_POLICY.md
      cloud_flatname: DOWNSTREAM_FEEDBACK_SANITIZATION_POLICY.md
    - path: docs/agent-system/STABLE_METHODOLOGY_REFERENCE_POLICY.md
      cloud_flatname: STABLE_METHODOLOGY_REFERENCE_POLICY.md
    - path: docs/agent-system/LANGUAGE_POLICY.md
      cloud_flatname: LANGUAGE_POLICY.md
  rules:
    - docs/agent-system/cloud/** генерируется из этого списка через `python docs/agent-system/tools/gen_cloud_bundle.py`.
    - `python docs/agent-system/tools/gen_cloud_bundle.py --check` должен проходить перед release.
    - Частичные строки `DECISION_LOG.md` добавляются архитектором вручную только если конкретная задача зависит от недавнего решения; полный history_state файл не входит в default cloud bundle.

